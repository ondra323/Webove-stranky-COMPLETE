<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · Kadlec & partneři</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- =====================================================
  FIREBASE SDK
  ===================================================== -->
<script type="module">
  // ⚙️ VÝVOJÁŘ: Vložte zde své Firebase konfigurační klíče
  // Získáte je na: https://console.firebase.google.com → Váš projekt → Nastavení projektu → Web app
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "VLOŽTE_VÁŠ_API_KEY",
    authDomain:        "VLOŽTE_VÁŠ_AUTH_DOMAIN",
    projectId:         "VLOŽTE_VÁŠ_PROJECT_ID",
    storageBucket:     "VLOŽTE_VÁŠ_STORAGE_BUCKET",
    messagingSenderId: "VLOŽTE_VÁŠ_MESSAGING_SENDER_ID",
    appId:             "VLOŽTE_VÁŠ_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.__db = db;
  window.__fbModules = { collection, getDocs, doc, getDoc, query, orderBy, where };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
:root {
  --forest: #113225;
  --forest-mid: #1e4d35;
  --forest-light: #2d6a4f;
  --gold: #b5935a;
  --gold-light: #d4af7a;
  --oat: #F9F7F3;
  --oat-dark: #f0ece4;
  --cream: #fffdf9;
  --text: #1e2120;
  --muted: #5a6360;
  --border: #e2ddd6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--oat); color: var(--text); font-size: 15px; }

/* ── TOP BAR ── */
.topbar { background: var(--forest); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
.topbar-logo { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--oat); text-decoration: none; }
.topbar-logo span { color: var(--gold); }
.topbar-back { font-size: 12px; color: rgba(249,247,243,0.5); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color .2s; }
.topbar-back:hover { color: var(--oat); }
.topbar-back svg { width: 14px; height: 14px; }

/* ── BLOG LIST VIEW ── */
#view-list { display: block; }
#view-detail { display: none; }

.blog-header { max-width: 1100px; margin: 0 auto; padding: 56px 32px 0; }
.eyebrow { font-size: 10px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--gold); }
.blog-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 600; color: var(--forest); letter-spacing: -.02em; line-height: 1.12; }
.blog-header p { font-size: 16px; color: var(--muted); font-weight: 300; margin-top: 12px; max-width: 520px; line-height: 1.7; }

/* ── FILTER ── */
.filter-bar { max-width: 1100px; margin: 36px auto 0; padding: 0 32px; display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { padding: 9px 20px; font-size: 12px; font-weight: 500; letter-spacing: .06em; border: 1px solid var(--border); background: var(--cream); color: var(--muted); cursor: pointer; transition: all .25s; font-family: 'DM Sans', sans-serif; }
.filter-btn:hover { border-color: var(--forest); color: var(--forest); }
.filter-btn.active { background: var(--forest); color: var(--oat); border-color: var(--forest); font-weight: 600; }

/* ── GRID ── */
.blog-grid { max-width: 1100px; margin: 32px auto 80px; padding: 0 32px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
@media (max-width: 900px) { .blog-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .blog-grid { grid-template-columns: 1fr; padding: 0 20px; } .blog-header, .filter-bar { padding: 0 20px; } }

/* ── CARD ── */
.card { background: var(--cream); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform .3s, box-shadow .3s; display: flex; flex-direction: column; }
.card:hover { transform: translateY(-5px); box-shadow: 0 20px 48px rgba(0,0,0,.09); }
.card-img { width: 100%; height: 200px; object-fit: cover; display: block; filter: grayscale(15%); transition: filter .5s; }
.card:hover .card-img { filter: grayscale(0); }
.card-img-placeholder { width: 100%; height: 200px; background: linear-gradient(135deg, var(--oat-dark), var(--border)); display: flex; align-items: center; justify-content: center; }
.card-img-placeholder svg { width: 36px; height: 36px; color: var(--border); }
.card-body { padding: 22px 24px; display: flex; flex-direction: column; flex: 1; }
.card-tag { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.card h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; color: var(--forest); line-height: 1.3; margin-bottom: 10px; letter-spacing: -.01em; }
.card p { font-size: 13.5px; color: var(--muted); line-height: 1.65; font-weight: 300; margin-bottom: 16px; flex: 1; }
.card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: rgba(90,99,96,.6); padding-top: 14px; border-top: 1px solid var(--border); }
.card-link { font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: .08em; text-transform: uppercase; }
.card-empty { grid-column: 1 / -1; text-align: center; padding: 64px; color: var(--muted); }
.card-empty svg { width: 40px; height: 40px; margin-bottom: 16px; opacity: .3; }
.card-empty p { font-size: 14px; }

/* ── SKELETON LOADING ── */
.skeleton { background: linear-gradient(90deg, var(--oat-dark) 25%, var(--border) 50%, var(--oat-dark) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 2px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-card { background: var(--cream); border: 1px solid var(--border); overflow: hidden; }
.skeleton-img { width: 100%; height: 200px; }
.skeleton-body { padding: 22px 24px; }
.skeleton-line { height: 12px; margin-bottom: 10px; border-radius: 2px; }

/* ── DETAIL VIEW ── */
.detail-hero { width: 100%; max-height: 440px; object-fit: cover; display: block; }
.detail-hero-placeholder { width: 100%; height: 360px; background: linear-gradient(135deg, var(--forest), var(--forest-mid)); display: flex; align-items: center; justify-content: center; }
.detail-hero-placeholder svg { width: 48px; height: 48px; color: rgba(255,255,255,.15); }
.detail-wrap { max-width: 760px; margin: 0 auto; padding: 48px 32px 100px; }
@media (max-width: 600px) { .detail-wrap { padding: 32px 20px 80px; } }
.detail-back { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; margin-bottom: 28px; background: none; border: none; font-family: 'DM Sans', sans-serif; transition: color .2s; padding: 0; }
.detail-back:hover { color: var(--forest); }
.detail-back svg { width: 16px; height: 16px; }
.detail-tag { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
.detail-title { font-family: 'Playfair Display', serif; font-size: clamp(1.7rem, 4vw, 2.5rem); font-weight: 600; color: var(--forest); line-height: 1.15; letter-spacing: -.02em; margin-bottom: 20px; }
.detail-byline { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 36px; }
.byline-avatar { width: 40px; height: 40px; background: var(--forest); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: var(--oat); flex-shrink: 0; }
.byline-name { font-size: 13px; font-weight: 600; color: var(--forest); }
.byline-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.detail-body { font-size: 16px; line-height: 1.8; color: rgba(26,28,27,.82); font-weight: 300; }
.detail-body h1, .detail-body h2, .detail-body h3 { font-family: 'Playfair Display', serif; color: var(--forest); margin: 32px 0 14px; line-height: 1.25; }
.detail-body h2 { font-size: 1.5rem; }
.detail-body h3 { font-size: 1.2rem; }
.detail-body p { margin-bottom: 20px; }
.detail-body strong { color: var(--text); font-weight: 600; }
.detail-body ul, .detail-body ol { padding-left: 24px; margin-bottom: 20px; }
.detail-body li { margin-bottom: 8px; }
.detail-body blockquote { border-left: 3px solid var(--gold); margin: 28px 0; padding: 16px 24px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: var(--forest); background: var(--oat-dark); }

.load-spinner { display: flex; justify-content: center; padding: 60px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--forest); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">Kadlec <span>&</span> partneři</a>
  <a href="index.html" class="topbar-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Zpět na web
  </a>
</div>

<!-- ══ BLOG LIST ══ -->
<div id="view-list">
  <div class="blog-header">
    <div class="eyebrow">Odborné články</div>
    <h1>Znalosti, které vám<br>pomáhají rozhodovat</h1>
    <p>Praktické rady z oblasti financí, investic a plánování. Bez žargonu, s čísly.</p>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-cat="vse" onclick="filterArticles('vse', this)">Vše</button>
    <button class="filter-btn" data-cat="Hypotéky" onclick="filterArticles('Hypotéky', this)">Hypotéky</button>
    <button class="filter-btn" data-cat="Investice" onclick="filterArticles('Investice', this)">Investice</button>
    <button class="filter-btn" data-cat="Penze" onclick="filterArticles('Penze', this)">Penze</button>
    <button class="filter-btn" data-cat="Ze života" onclick="filterArticles('Ze života', this)">Ze života</button>
  </div>

  <div class="blog-grid" id="blog-grid">
    <!-- skeleton loading -->
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line" style="width:40%;height:10px;margin-bottom:14px"></div>
        <div class="skeleton skeleton-line" style="width:90%"></div>
        <div class="skeleton skeleton-line" style="width:75%"></div>
        <div class="skeleton skeleton-line" style="width:85%;margin-top:8px;height:10px"></div>
        <div class="skeleton skeleton-line" style="width:60%;height:10px"></div>
      </div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line" style="width:35%;height:10px;margin-bottom:14px"></div>
        <div class="skeleton skeleton-line" style="width:88%"></div>
        <div class="skeleton skeleton-line" style="width:70%"></div>
        <div class="skeleton skeleton-line" style="width:80%;margin-top:8px;height:10px"></div>
        <div class="skeleton skeleton-line" style="width:55%;height:10px"></div>
      </div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line" style="width:45%;height:10px;margin-bottom:14px"></div>
        <div class="skeleton skeleton-line" style="width:92%"></div>
        <div class="skeleton skeleton-line" style="width:78%"></div>
        <div class="skeleton skeleton-line" style="width:82%;margin-top:8px;height:10px"></div>
        <div class="skeleton skeleton-line" style="width:65%;height:10px"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ ARTICLE DETAIL ══ -->
<div id="view-detail"></div>

<script>
let allArticles = []
let activeFilter = 'vse'

function readingTime(html) {
  const text = html.replace(/<[^>]*>/g, '')
  const words = text.trim().split(/\s+/).length
  return Math.max(1, Math.round(words / 200))
}

function formatDate(ts) {
  if (!ts) return ''
  const d = ts.toDate ? ts.toDate() : new Date(ts)
  return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'long', year: 'numeric' })
}

function renderGrid(articles) {
  const grid = document.getElementById('blog-grid')
  if (!articles.length) {
    grid.innerHTML = `<div class="card-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><p>Žádné články v této kategorii.</p></div>`
    return
  }
  grid.innerHTML = articles.map(a => `
    <div class="card" onclick="showDetail('${a.id}')">
      ${a.imageUrl
        ? `<img class="card-img" src="${a.imageUrl}" alt="${a.title}" loading="lazy">`
        : `<div class="card-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`
      }
      <div class="card-body">
        <div class="card-tag">${a.category || ''}</div>
        <h2>${a.title}</h2>
        <p>${a.excerpt || ''}</p>
        <div class="card-meta">
          <span>${formatDate(a.publishedAt)}</span>
          <span>${readingTime(a.content || '')} min čtení</span>
        </div>
      </div>
    </div>
  `).join('')
}

function filterArticles(cat, btn) {
  activeFilter = cat
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  const filtered = cat === 'vse' ? allArticles : allArticles.filter(a => a.category === cat)
  renderGrid(filtered)
}

function showDetail(id) {
  const a = allArticles.find(x => x.id === id)
  if (!a) return
  const detail = document.getElementById('view-detail')
  const rt = readingTime(a.content || '')
  detail.innerHTML = `
    ${a.imageUrl
      ? `<img class="detail-hero" src="${a.imageUrl}" alt="${a.title}">`
      : `<div class="detail-hero-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="21 15 16 10 5 21"/></svg></div>`
    }
    <div class="detail-wrap">
      <button class="detail-back" onclick="showList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Zpět na blog
      </button>
      <div class="detail-tag">${a.category || ''}</div>
      <h1 class="detail-title">${a.title}</h1>
      <div class="detail-byline">
        <div class="byline-avatar">OK</div>
        <div>
          <div class="byline-name">Ondřej Kadlec</div>
          <div class="byline-meta">${formatDate(a.publishedAt)} · ${rt} min čtení</div>
        </div>
      </div>
      <div class="detail-body">${a.content || ''}</div>
    </div>
  `
  document.getElementById('view-list').style.display = 'none'
  detail.style.display = 'block'
  window.scrollTo({ top: 0, behavior: 'smooth' })
  history.pushState({ articleId: id }, '', `?clanek=${id}`)
}

function showList() {
  document.getElementById('view-list').style.display = 'block'
  document.getElementById('view-detail').style.display = 'none'
  history.pushState({}, '', window.location.pathname)
  window.scrollTo({ top: 0 })
}

window.addEventListener('popstate', e => {
  if (e.state && e.state.articleId) showDetail(e.state.articleId)
  else showList()
})

// Load articles from Firebase
window.addEventListener('firebase-ready', async () => {
  const { collection, getDocs, query, orderBy, where } = window.__fbModules
  const db = window.__db
  try {
    const q = query(
      collection(db, 'articles'),
      where('status', '==', 'published'),
      orderBy('publishedAt', 'desc')
    )
    const snap = await getDocs(q)
    allArticles = snap.docs.map(d => ({ id: d.id, ...d.data() }))
    renderGrid(allArticles)

    // Handle direct URL to article
    const params = new URLSearchParams(location.search)
    if (params.get('clanek')) showDetail(params.get('clanek'))
  } catch (err) {
    console.error('Firebase chyba:', err)
    document.getElementById('blog-grid').innerHTML = `<div class="card-empty"><p>Nepodařilo se načíst články. Zkontrolujte Firebase konfiguraci.</p></div>`
  }
})
</script>
</body>
</html>
